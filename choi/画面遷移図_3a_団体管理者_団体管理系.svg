  </defs>

  <rect width="1123" height="794" fill="#fafaf8"/>

  <text x="24" y="32" class="title">A画面群 画面遷移図 — 団体管理者 (a) 団体管理系</text>
  <text x="24" y="50" class="subtitle">自団体の管理に関わる画面群。個人コンテンツ(マイコース/マイユニット)は図3b を参照</text>

