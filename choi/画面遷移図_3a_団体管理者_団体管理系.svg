  <text x="24" y="710" class="note-text">※ 団体管理者も個人会員として「マイコース」「マイユニット」を保有できる。それらの画面と遷移は図3b を参照。</text>
  <text x="24" y="724" class="note-text">※ 介入編集(A-C2 / A-U2)は他メンバー主催のコース/投稿に対する上位権限での編集。介入バナーを表示、保存時に「介入編集として記録」。</text>
  <text x="24" y="738" class="note-text">※ A-CM1(コースメンバー一覧)は A-C2 内のタブ。独立した画面ではない。A-CM2(招待)は共通帯の画面(図3b)。</text>
  <text x="24" y="752" class="note-text">※ 左ペイン遷移(薄いグレー破線)は全画面から A-T2/A-M1/A-C1/A-U1 へ常時アクセス可能であることを示す。</text>
  <text x="24" y="766" class="note-text">遷移エッジ(この図で扱う分): E7, E10, E11, E12, E13, E14, E15, E16, E17, E18, E19, E20, E21, E32, E34(A-C2→A-U1)</text>
  <text x="24" y="780" class="note-text">遷移エッジ(図3b で扱う分): E4(←), E8, E9, E22〜E31(マイコース/マイユニット/A-CM2系), E33(A-MC2→A-MU1)</text>
